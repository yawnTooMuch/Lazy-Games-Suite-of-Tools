site_name: Diary Framework
site_description: Documentation for the Diary MMORPG Persistence System
theme:
  name: material
  palette:
    # Forces a sleek dark mode by default
    scheme: slate
    primary: deep purple
    accent: cyan
  features:
    - navigation.tabs # Creates top-level tabs
    - navigation.sections # Groups items in the sidebar
    - search.suggest # Better search functionality

# This defines your sidebar navigation
nav:
  - Home: index.md
  - Systems:
    - Diary: systems/diary.md
    - DataStore: systems/datastore.md
    - MemoryStore: systems/memorystore.md
  - Utilities:
    - Assignment: utilities/assignment.md
    - DependentServices: utilities/dependentservices.md